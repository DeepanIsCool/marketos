# MarketOS — Local Development Infrastructure
# Production-optimized local equivalents for all services
#
# Services:
#   redpanda   → Apache Kafka (Kafka-compatible, zero ZooKeeper)
#   postgres   → PostgreSQL 16 + pgvector extension
#   redis      → Redis 7 (cache + working memory + distributed locks)
#   clickhouse → ClickHouse (analytics OLAP database)
#
# Usage:
#   docker compose up -d
#   docker compose down -v        # stop + wipe all data

services:

  # ── Kafka (Redpanda) ────────────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: marketos_redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=256M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --default-log-level=warn
      # Internal listener (Docker network — for console + other services)
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:28082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:28082
      - --set=redpanda.auto_create_topics_enabled=true
      - --set=redpanda.log_segment_size_bytes=16777216
    ports:
      - "9092:9092"
      - "28082:28082"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    mem_limit: 512m
    healthcheck:
      test: [ "CMD-SHELL", "rpk cluster health --api-urls localhost:9644 | grep -q 'Healthy' || curl -sf http://localhost:9644/v1/status/ready" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Redpanda Console — http://localhost:8080
  redpanda_console:
    image: redpandadata/console:v2.5.2
    container_name: marketos_console
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8080:8080"
    mem_limit: 256m

  # ── PostgreSQL 16 + pgvector ────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: marketos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketos
      POSTGRES_USER: marketos
      POSTGRES_PASSWORD: marketos_dev
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - effective_cache_size=512MB
      - -c
      - max_connections=100
      - -c
      - random_page_cost=1.1
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - log_min_duration_statement=500
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init_postgres.sql:/docker-entrypoint-initdb.d/01_init.sql
    mem_limit: 1g
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U marketos -d marketos" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis 7 ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: marketos_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save ""
      --loglevel warning
      --tcp-keepalive 60
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    mem_limit: 640m
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── ClickHouse ──────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: marketos_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: marketos_analytics
      CLICKHOUSE_USER: marketos
      CLICKHOUSE_PASSWORD: marketos_dev
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/init_clickhouse.sql:/docker-entrypoint-initdb.d/01_init.sql
    mem_limit: 1g
    healthcheck:
      test: [ "CMD-SHELL", "clickhouse-client --query 'SELECT 1'" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  redpanda_data:
  postgres_data:
  redis_data:
  clickhouse_data:
