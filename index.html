<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketOS | Agency Suite</title>

  <!-- Minimalist Typography: Inter (closest to SF Pro for web) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Inter"', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
          colors: {
            apple: {
              bg: '#F2DDDC',        // Warm beige ("yellow side" from palette)
              card: '#FFFFFF',
              text: '#3D3D4A',      // Soft dark slate
              muted: '#8E8E9F',     // Muted tone
              border: '#E8CAE3',    // Soft border using a very faded tone
              blue: '#C3C7F4',      // Periwinkle accent from palette
              blueHover: '#A8ADED', // Darker Periwinkle for hover
              green: '#96C9A8',     // Subdued green
              red: '#F6BCBA'        // Soft coral for errors
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.4s ease-out forwards',
          },
          keyframes: {
            fadeIn: {
              from: { opacity: '0', transform: 'translateY(4px)' },
              to: { opacity: '1', transform: 'translateY(0)' }
            }
          }
        }
      }
    }
  </script>

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background-color: #F2DDDC;
      color: #1D1D1F;
      overflow-x: hidden;
    }

    .apple-input {
      background: #FFFFFF;
      border: 1px solid #E5E5EA;
      border-radius: 8px;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.01);
      transition: all 0.2s ease;
    }

    .apple-input:focus {
      border-color: #C3C7F4;
      box-shadow: 0 0 0 3px rgba(195, 199, 244, 0.35);
      outline: none;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #D1D1D6;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #AEAEB2;
    }
  </style>
</head>

<body class="antialiased min-h-screen relative flex flex-col selection:bg-blue-100 selection:text-apple-blue">

  <!-- Top Navigation -->
  <nav
    class="w-full bg-white/80 backdrop-blur-md border-b border-apple-border px-6 py-3 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-2 text-[15px] font-semibold tracking-tight text-apple-text">
      <i data-lucide="command" class="w-4 h-4"></i> MarketOS
    </div>
    <div class="flex items-center gap-5 text-[13px] font-medium text-apple-muted">
      <span class="hover:text-apple-text cursor-pointer transition-colors">Dashboard</span>
      <span class="hover:text-apple-text cursor-pointer transition-colors">Audiences</span>
      <div class="h-4 w-px bg-apple-border"></div>
      <div class="flex items-center gap-2 cursor-pointer">
        <div
          class="w-6 h-6 rounded-full bg-apple-bg border border-apple-border flex items-center justify-center text-apple-muted">
          <i data-lucide="user" class="w-3 h-3"></i>
        </div>
      </div>
    </div>
  </nav>

  <!-- Root React Node -->
  <div id="root" class="w-full flex-grow flex p-6 lg:p-8 max-w-[1400px] mx-auto gap-8"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const useLucide = () => {
      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      });
    };

    // The 16 agents mapped exactly to the campaign graph API nodes
    const PIPELINE_PHASES = [
      {
        id: 'strategy',
        title: 'Strategy & Analysis',
        agents: [
          { id: 'supervisor', label: 'Campaign Architect', icon: 'brain-circuit' },
          { id: 'competitor_agent', label: 'Market Intel', icon: 'radar' },
          { id: 'seo_agent', label: 'Search Optimizer', icon: 'search' },
        ]
      },
      {
        id: 'creative',
        title: 'Creative Assembly',
        agents: [
          { id: 'copy_agent', label: 'Brand Copywriter', icon: 'pen-tool' },
          { id: 'image_agent', label: 'Visual Designer', icon: 'image' },
          { id: 'compliance_agent', label: 'Legal & Safety', icon: 'shield-check' },
        ]
      },
      {
        id: 'distribution',
        title: 'Omnichannel Outreach',
        agents: [
          { id: 'email_agent', label: 'Email Outreach', icon: 'mail' },
          { id: 'sms_agent', label: 'SMS Marketing', icon: 'smartphone' },
          { id: 'voice_agent', label: 'Voice AI Agent', icon: 'mic' },
          { id: 'social_media_agent', label: 'Social Publisher', icon: 'share-2' },
        ]
      },
      {
        id: 'optimization',
        title: 'Performance & RevOps',
        agents: [
          { id: 'finance_agent', label: 'Budget Allocation', icon: 'pie-chart' },
          { id: 'analytics_agent', label: 'Data Tracking', icon: 'activity' },
          { id: 'monitor_agent', label: 'Uptime Monitor', icon: 'eye' },
          { id: 'ab_test_agent', label: 'Experimentation', icon: 'split-square-horizontal' },
          { id: 'lead_scoring_agent', label: 'Sales Qualifier', icon: 'target' },
          { id: 'reporting_agent', label: 'Client Reporting', icon: 'file-text' },
        ]
      }
    ];

    const DEFAULT_FORM_DATA = {
      user_intent: "Launch our premium skincare line to millennials. Focus on natural ingredients. Include a 20% discount code via email and SMS.",
      recipient_email: "sadhukhandeepan@gmail.com",
      recipient_phone: "7003574257",
      company_name: "Aura Botanicals",
      sender_name: "Aura Team",
    };

    const App = () => {
      useLucide();

      const [formData, setFormData] = useState(DEFAULT_FORM_DATA);
      const [isRunning, setIsRunning] = useState(false);
      const [nodeStates, setNodeStates] = useState({}); // 'idle' | 'processing' | 'success' | 'failure'
      const [logs, setLogs] = useState([]);

      const addLog = (msg, type = 'info') => {
        setLogs(prev => [...prev, { time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }), msg, type }]);
      };

      const initializeStates = () => {
        const initial = {};
        PIPELINE_PHASES.forEach(phase => {
          phase.agents.forEach(a => initial[a.id] = 'idle');
        });
        setNodeStates(initial);
      };

      useEffect(() => {
        initializeStates();
      }, []);

      const handleRun = async () => {
        if (isRunning) return;
        setIsRunning(true);
        setLogs([]);
        initializeStates();

        addLog("Initiating Real-time Pipeline Stream...", "info");

        setNodeStates(prev => {
          const next = { ...prev };
          next['supervisor'] = 'processing';
          return next;
        });

        try {
          const response = await fetch("http://127.0.0.1:8000/v1/pipeline/campaign/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "text/event-stream" },
            body: JSON.stringify({
              ...formData,
              workspace_id: "agency_001",
              company_address: "Premium Plaza, NY",
              unsubscribe_url: "https://aura.com/unsub"
            })
          });

          if (!response.ok) {
            let errorMsg = "Pipeline exception";
            try {
              const errData = await response.json();
              errorMsg = errData.detail?.error || errorMsg;
            } catch (e) { }
            throw new Error(errorMsg);
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder("utf-8");
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const chunks = buffer.split("\n\n");
            buffer = chunks.pop() || "";

            for (const chunk of chunks) {
              const lines = chunk.split("\n");
              for (const line of lines) {
                if (line.startsWith("data: ")) {
                  const dataStr = line.substring(6).trim();
                  if (!dataStr) continue;

                  try {
                    const payload = JSON.parse(dataStr);

                    if (payload.status === "completed") {
                      addLog("Pipeline execution finalized strictly.", "success");
                      continue;
                    }

                    if (payload.error) {
                      addLog(`Engine Error: ${payload.error}`, "error");
                      continue;
                    }

                    if (payload.node && payload.node !== "__start__" && payload.node !== "__end__") {
                      addLog(`Node completed successfully: ${payload.node}`, "info");

                      setNodeStates(prev => {
                        const next = { ...prev };
                        
                        // 1. Accumulate newly finished agents from the incremental trace delta
                        if (payload.trace && Array.isArray(payload.trace)) {
                          payload.trace.forEach(t => {
                            if (t.agent) {
                              next[t.agent] = t.ok ? 'success' : 'failure';
                            }
                          });
                        }

                        // 2. Move "processing" cursor to the FIRST uncompleted agent
                        let processingSet = false;
                        for (const phase of PIPELINE_PHASES) {
                          for (const a of phase.agents) {
                            if (next[a.id] !== 'success' && next[a.id] !== 'failure') {
                              if (!processingSet) {
                                next[a.id] = 'processing';
                                processingSet = true;
                              } else {
                                next[a.id] = 'idle';
                              }
                            }
                          }
                        }
                        
                        return next;
                      });
                    }
                  } catch (e) {
                    console.error("SSE JSON Parse Error", e);
                  }
                } else if (line.startsWith("event: error")) {
                  addLog("Pipeline Stream Error Event", "error");
                }
              }
            }
          }

        } catch (err) {
          addLog(`Error: ${err.message}`, "error");
          setNodeStates(prev => {
            const next = { ...prev };
            Object.keys(next).forEach(k => {
              if (next[k] === 'processing') next[k] = 'failure';
            });
            return next;
          });
        } finally {
          setIsRunning(false);
          // Cleanup orphans
          setNodeStates(prev => {
            const next = { ...prev };
            Object.keys(next).forEach(k => {
              if (next[k] === 'processing') next[k] = 'idle';
            });
            return next;
          });
        }
      };

      const AgentCard = ({ agent }) => {
        const state = nodeStates[agent.id] || 'idle';

        let containerClass = "border-apple-border bg-white text-apple-muted";
        let iconBg = "text-apple-muted";
        let statusElement = null;

        if (state === 'processing') {
          containerClass = "border-apple-blue shadow-[0_0_0_1px_rgba(0,113,227,0.3)] bg-white text-apple-text";
          iconBg = "text-apple-blue";
          statusElement = <i data-lucide="loader-2" className="w-3.5 h-3.5 text-apple-blue animate-spin"></i>;
        } else if (state === 'success') {
          containerClass = "border-apple-border bg-[#F9F9F9] text-apple-text";
          iconBg = "text-apple-green";
          statusElement = <i data-lucide="check" className="w-3.5 h-3.5 text-apple-green"></i>;
        } else if (state === 'failure') {
          containerClass = "border-apple-red/50 bg-[#FEF2F2] text-apple-red";
          iconBg = "text-apple-red";
          statusElement = <i data-lucide="x" className="w-3.5 h-3.5 text-apple-red"></i>;
        }

        return (
          <div className={`p-2.5 rounded-xl border transition-all duration-300 flex items-center justify-between ${containerClass}`}>
            <div className="flex items-center gap-2.5">
              <i data-lucide={agent.icon} className={`w-4 h-4 ${iconBg}`}></i>
              <h4 className="text-[13px] font-medium tracking-tight mb-0.5">{agent.label}</h4>
            </div>
            <div className="shrink-0 flex items-center justify-center w-4 h-4">
              {statusElement}
            </div>
          </div>
        );
      };

      return (
        <React.Fragment>
          {/* Left Column: Form Setup */}
          <div className="w-full lg:w-[400px] shrink-0 flex flex-col gap-6 animate-fade-in">

            <div className="bg-white rounded-2xl p-6 shadow-sm border border-apple-border">
              <h2 className="text-[17px] font-semibold text-apple-text mb-4">Campaign Brief</h2>

              <div className="space-y-4">
                <div>
                  <label className="text-[12px] font-medium text-apple-muted mb-1.5 block">Marketing Intent</label>
                  <textarea
                    className="w-full h-24 apple-input p-2.5 text-[13px] text-apple-text resize-none"
                    value={formData.user_intent}
                    onChange={(e) => setFormData({ ...formData, user_intent: e.target.value })}
                    placeholder="E.g., Sell our new summer collection via email..."
                  ></textarea>
                </div>

                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-[12px] font-medium text-apple-muted mb-1.5 block">Brand</label>
                    <input
                      className="w-full apple-input p-2 text-[13px] text-apple-text"
                      type="text" value={formData.company_name} onChange={(e) => setFormData({ ...formData, company_name: e.target.value })}
                    />
                  </div>
                  <div>
                    <label className="text-[12px] font-medium text-apple-muted mb-1.5 block">Sender</label>
                    <input
                      className="w-full apple-input p-2 text-[13px] text-apple-text"
                      type="text" value={formData.sender_name} onChange={(e) => setFormData({ ...formData, sender_name: e.target.value })}
                    />
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-[12px] font-medium text-apple-muted mb-1.5 block">Test Email</label>
                    <input
                      className="w-full apple-input p-2 text-[13px] text-apple-text"
                      type="email" value={formData.recipient_email} onChange={(e) => setFormData({ ...formData, recipient_email: e.target.value })}
                    />
                  </div>
                  <div>
                    <label className="text-[12px] font-medium text-apple-muted mb-1.5 block">Test Phone</label>
                    <input
                      className="w-full apple-input p-2 text-[13px] text-apple-text"
                      type="tel" value={formData.recipient_phone} onChange={(e) => setFormData({ ...formData, recipient_phone: e.target.value })}
                    />
                  </div>
                </div>

                <div className="pt-2">
                  <button
                    onClick={handleRun}
                    disabled={isRunning}
                    className={`px-5 py-2.5 rounded-full font-medium text-[13px] transition-all flex items-center gap-2 ${isRunning
                        ? 'bg-apple-border text-apple-muted cursor-not-allowed'
                        : 'bg-apple-blue hover:bg-apple-blueHover text-apple-text shadow-sm'
                      }`}
                  >
                    {isRunning ? (
                      <React.Fragment>
                        <i data-lucide="loader-2" className="w-4 h-4 animate-spin"></i> Processing
                      </React.Fragment>
                    ) : (
                      <React.Fragment>
                        <i data-lucide="play" className="w-4 h-4"></i> Generate
                      </React.Fragment>
                    )}
                  </button>
                </div>
              </div>
            </div>

            {/* Simple Logs */}
            <div className="bg-white rounded-2xl shadow-sm border border-apple-border flex-grow flex flex-col overflow-hidden">
              <div className="border-b border-apple-border px-5 py-2.5">
                <h3 className="text-[12px] font-medium text-apple-muted">System Logs</h3>
              </div>
              <div className="p-4 flex-grow overflow-y-auto text-[12px] font-mono leading-relaxed flex flex-col gap-1.5">
                {logs.length === 0 && <div className="text-apple-muted/60 text-center mt-4">Awaiting execution.</div>}
                {logs.map((log, i) => (
                  <div key={i} className="flex gap-3">
                    <span className="text-apple-muted shrink-0">{log.time}</span>
                    <span className={
                      log.type === 'error' ? 'text-apple-red' :
                        log.type === 'success' ? 'text-apple-green' :
                          'text-apple-text'
                    }>{log.msg}</span>
                  </div>
                ))}
              </div>
            </div>

          </div>

          {/* Right Column: Seamless Pipeline Stepper */}
          <div className="flex-grow bg-white rounded-2xl p-8 shadow-sm border border-apple-border animate-fade-in flex flex-col overflow-hidden">
            <h2 className="text-[17px] font-semibold text-apple-text mb-6">Task Execution</h2>

            <div className="flex-grow overflow-y-auto pr-4 custom-scrollbar flex flex-col">
              {PIPELINE_PHASES.map((phase, idx) => (
                <div key={phase.id} className="flex relative">
                  {/* Seamless Vertical Rule connecting the circles */}
                  {idx !== PIPELINE_PHASES.length - 1 && (
                    <div className="absolute left-[13px] top-[30px] bottom-[-6px] w-[2px] bg-apple-border"></div>
                  )}

                  {/* Step Indicator */}
                  <div className="relative z-10 w-7 h-7 rounded-full bg-white border-2 border-apple-border flex items-center justify-center shrink-0 mt-1">
                    <span className="text-[11px] font-bold text-apple-muted">{idx + 1}</span>
                  </div>

                  {/* Phase Content */}
                  <div className="ml-5 flex-grow pb-5 w-full">
                    <h3 className="text-[14px] font-semibold text-apple-text mb-3 mt-1.5 tracking-tight">{phase.title}</h3>

                    {/* Compact Agent Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2.5">
                      {phase.agents.map(agent => <AgentCard key={agent.id} agent={agent} />)}
                    </div>
                  </div>
                </div>
              ))}
            </div>

          </div>
        </React.Fragment>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
