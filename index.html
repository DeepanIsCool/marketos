<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketOS | Agency Suite</title>

  <!-- Minimalist Typography: Inter (closest to SF Pro for web) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Inter"', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
          colors: {
            apple: {
              bg: '#F2DDDC',        // Warm beige ("yellow side" from palette)
              card: '#FFFFFF',
              text: '#3D3D4A',      // Soft dark slate
              muted: '#8E8E9F',     // Muted tone
              border: '#E8CAE3',    // Soft border using a very faded tone
              blue: '#C3C7F4',      // Periwinkle accent from palette
              blueHover: '#A8ADED', // Darker Periwinkle for hover
              green: '#96C9A8',     // Subdued green
              red: '#F6BCBA'        // Soft coral for errors
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.4s ease-out forwards',
          },
          keyframes: {
            fadeIn: {
              from: { opacity: '0', transform: 'translateY(4px)' },
              to: { opacity: '1', transform: 'translateY(0)' }
            }
          }
        }
      }
    }
  </script>

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background-color: #F2DDDC;
      color: #1D1D1F;
      overflow-x: hidden;
    }

    .apple-input {
      background: #FFFFFF;
      border: 1px solid #E5E5EA;
      border-radius: 8px;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.01);
      transition: all 0.2s ease;
    }

    .apple-input:focus {
      border-color: #C3C7F4;
      box-shadow: 0 0 0 3px rgba(195, 199, 244, 0.35);
      outline: none;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #D1D1D6;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #AEAEB2;
    }
    
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #E5E5EA;
      border-radius: 4px;
    }
  </style>
</head>

<body class="antialiased min-h-screen relative flex flex-col selection:bg-blue-100 selection:text-apple-blue">

  <!-- Top Navigation -->
  <nav
    class="w-full bg-white/80 backdrop-blur-md border-b border-apple-border px-6 py-3 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-2 text-[15px] font-semibold tracking-tight text-apple-text">
      <i data-lucide="command" class="w-4 h-4"></i> MarketOS
    </div>
    <div class="flex items-center gap-5 text-[13px] font-medium text-apple-muted">
      <span class="hover:text-apple-text cursor-pointer transition-colors">Dashboard</span>
      <span class="hover:text-apple-text cursor-pointer transition-colors">Audiences</span>
      <div class="h-4 w-px bg-apple-border"></div>
      <div class="flex items-center gap-2 cursor-pointer">
        <div
          class="w-6 h-6 rounded-full bg-apple-bg border border-apple-border flex items-center justify-center text-apple-muted">
          <i data-lucide="user" class="w-3 h-3"></i>
        </div>
      </div>
    </div>
  </nav>

  <!-- Root React Node -->
  <div id="root" class="w-full flex-grow flex p-6 lg:p-8 max-w-[1400px] mx-auto gap-8"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const useLucide = () => {
      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      });
    };

    const PIPELINE_PHASES = [
      {
        id: 'strategy',
        title: 'Strategy & Analysis',
        agents: [
          { id: 'supervisor', label: 'Campaign Architect', icon: 'brain-circuit', needsApproval: true, stateKey: 'campaign_plan' },
          { id: 'competitor_agent', label: 'Market Intel', icon: 'radar', needsApproval: false },
          { id: 'seo_agent', label: 'Search Optimizer', icon: 'search', needsApproval: false }
        ]
      },
      {
        id: 'creative',
        title: 'Creative Assembly',
        agents: [
          { id: 'copy_agent', label: 'Brand Copywriter', icon: 'pen-tool', needsApproval: true, stateKey: 'copy_output' },
          { id: 'image_agent', label: 'Visual Designer', icon: 'image', needsApproval: true, stateKey: 'copy_output' },
          { id: 'compliance_agent', label: 'Legal & Safety', icon: 'shield-check', needsApproval: true, stateKey: 'compliance_result' }
        ]
      },
      {
        id: 'distribution',
        title: 'Omnichannel Outreach',
        agents: [
          { id: 'email_agent', label: 'Email Outreach', icon: 'mail', needsApproval: false },
          { id: 'sms_agent', label: 'SMS Marketing', icon: 'smartphone', needsApproval: false },
          { id: 'voice_agent', label: 'Voice AI Agent', icon: 'mic', needsApproval: false },
          { id: 'social_media_agent', label: 'Social Publisher', icon: 'share-2', needsApproval: false }
        ]
      },
      {
        id: 'optimization',
        title: 'Performance & RevOps',
        agents: [
          { id: 'finance_agent', label: 'Budget Allocation', icon: 'pie-chart', needsApproval: false },
          { id: 'analytics_agent', label: 'Data Tracking', icon: 'activity', needsApproval: false },
          { id: 'monitor_agent', label: 'Uptime Monitor', icon: 'eye', needsApproval: false },
          { id: 'ab_test_agent', label: 'Experimentation', icon: 'split-square-horizontal', needsApproval: false },
          { id: 'lead_scoring_agent', label: 'Sales Qualifier', icon: 'target', needsApproval: false },
          { id: 'reporting_agent', label: 'Client Reporting', icon: 'file-text', needsApproval: false }
        ]
      }
    ];

    const ALL_AGENTS = PIPELINE_PHASES.flatMap(p => p.agents);
    const EXECUTION_AGENT_IDS = [
      'supervisor',
      'competitor_agent',
      'seo_agent',
      'copy_agent',
      'image_agent',
      'compliance_agent',
      'finance_agent',
      'email_agent',
      'sms_agent',
      'voice_agent',
      'social_media_agent',
      'analytics_agent',
      'monitor_agent',
      'ab_test_agent',
      'lead_scoring_agent',
      'reporting_agent'
    ];
    const APPROVAL_HIDDEN_KEY_PATTERN = /base64/i;
    const ALWAYS_RUN_AGENT_IDS = new Set([
      'supervisor',
      'competitor_agent',
      'seo_agent',
      'copy_agent',
      'image_agent',
      'compliance_agent',
      'finance_agent',
      'analytics_agent',
      'monitor_agent',
      'ab_test_agent',
      'lead_scoring_agent',
      'reporting_agent'
    ]);
    const CHANNEL_AGENT_IDS = {
      email: ['email_agent'],
      sms: ['sms_agent'],
      voice: ['voice_agent'],
      social: ['social_media_agent']
    };

    const getExecutionAgents = (channels) => {
      const selected = new Set(
        (channels || []).flatMap(ch => CHANNEL_AGENT_IDS[ch] || [])
      );
      const byId = new Map(ALL_AGENTS.map(agent => [agent.id, agent]));
      return EXECUTION_AGENT_IDS
        .map(id => byId.get(id))
        .filter(agent => agent && (ALWAYS_RUN_AGENT_IDS.has(agent.id) || selected.has(agent.id)));
    };

    const stripApprovalFields = (value) => {
      if (Array.isArray(value)) {
        return value.map(stripApprovalFields);
      }
      if (value && typeof value === 'object') {
        return Object.fromEntries(
          Object.entries(value)
            .filter(([key]) => !APPROVAL_HIDDEN_KEY_PATTERN.test(key))
            .map(([key, innerValue]) => [key, stripApprovalFields(innerValue)])
        );
      }
      return value;
    };

    const mergeApprovalState = (base, edited) => {
      if (Array.isArray(base) && Array.isArray(edited)) {
        return edited.map((item, index) => mergeApprovalState(base[index], item));
      }
      if (
        base &&
        edited &&
        typeof base === 'object' &&
        typeof edited === 'object' &&
        !Array.isArray(base) &&
        !Array.isArray(edited)
      ) {
        const merged = { ...base };
        Object.entries(edited).forEach(([key, value]) => {
          merged[key] = key in base ? mergeApprovalState(base[key], value) : value;
        });
        return merged;
      }
      return edited;
    };

    const getApprovalEditorState = (resultData, stateKey) =>
      JSON.stringify(stripApprovalFields(resultData[stateKey]), null, 2);

    const getAgentOutcome = (agentId, resultData) => {
      if (agentId === 'email_agent') {
        const sendResult = resultData.send_result;
        if (!sendResult) return null;
        return sendResult.real_email_sent
          ? { state: 'success', type: 'success', message: `Email delivered via ${sendResult.provider || 'provider'} to ${resultData.recipient_email || 'recipient'}.` }
          : { state: 'warning', type: 'error', message: `Email not delivered: ${sendResult.real_email_status || 'unknown reason'}.` };
      }

      if (agentId === 'sms_agent') {
        const smsResult = resultData.sms_result;
        if (!smsResult) return null;
        if (smsResult.status === 'sent') {
          return { state: 'success', type: 'success', message: `SMS sent via ${smsResult.provider || 'provider'}.` };
        }
        if (smsResult.status === 'scheduled') {
          return { state: 'warning', type: 'info', message: `SMS scheduled: ${smsResult.reason_code || 'deferred'}${smsResult.scheduled_for ? ` until ${smsResult.scheduled_for}` : ''}.` };
        }
        return { state: 'warning', type: 'error', message: `SMS not sent: ${smsResult.reason_code || smsResult.status || 'unknown reason'}.` };
      }

      if (agentId === 'voice_agent') {
        const voiceResult = resultData.voice_result;
        if (!voiceResult) return null;
        if (voiceResult.status && !['failed', 'skipped'].includes(voiceResult.status)) {
          return { state: 'success', type: 'success', message: `Voice call dispatched (${voiceResult.status}).` };
        }
        return { state: 'warning', type: 'error', message: `Voice call not dispatched: ${voiceResult.reason_code || voiceResult.status || 'unknown reason'}.` };
      }

      if (agentId === 'social_media_agent') {
        const socialResult = resultData.social_result;
        if (socialResult?.publish_status) {
          return { state: 'success', type: 'success', message: `Social publisher status: ${socialResult.publish_status}.` };
        }
      }

      return null;
    };

    const DEFAULT_FORM_DATA = {
      user_intent: "Launch our premium skincare line to millennials. Focus on natural ingredients. Include a 20% discount code via email and SMS.",
      channels: ["email", "sms", "social"],
      recipient_email: "sadhukhandeepan@gmail.com",
      recipient_phone: "+917003574257",
      company_name: "Aura Botanicals",
      sender_name: "Aura Team",
    };

    const App = () => {
      useLucide();

      const [formData, setFormData] = useState(DEFAULT_FORM_DATA);
      const [nodeStates, setNodeStates] = useState({});
      const [logs, setLogs] = useState([]);
      
      const [globalState, setGlobalState] = useState({});
      const [executionAgents, setExecutionAgents] = useState(ALL_AGENTS);
      const [agentIndex, setAgentIndex] = useState(-1);
      const [approvalPending, setApprovalPending] = useState(null);
      const [editedState, setEditedState] = useState("");

      const logsEndRef = useRef(null);

      const addLog = (msg, type = 'info') => {
        setLogs(prev => [...prev, { time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }), msg, type }]);
      };

      useEffect(() => {
        if (logsEndRef.current) {
          logsEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [logs]);

      const initializeStates = () => {
        const initial = {};
        ALL_AGENTS.forEach(a => initial[a.id] = 'idle');
        setNodeStates(initial);
      };

      useEffect(() => {
        initializeStates();
      }, []);

      const handleRun = (e) => {
        if (e && e.preventDefault) e.preventDefault();
        setLogs([]);
        initializeStates();
        const agentsToRun = getExecutionAgents(formData.channels);
        if (agentsToRun.length === 0) {
          addLog("Select at least one channel before running the pipeline.", "error");
          return;
        }

        const initialState = {
          user_intent: formData.user_intent,
          user_channels: formData.channels,
          pipeline: "campaign",
          workspace_id: "agency_001",
          recipient_email: formData.recipient_email,
          recipient_phone: formData.recipient_phone,
          sender_name: formData.sender_name,
          company_name: formData.company_name,
          company_address: "Premium Plaza, NY",
          unsubscribe_url: "https://aura.com/unsub",
          current_step: "supervisor",
          errors: [],
          trace: []
        };
        setExecutionAgents(agentsToRun);
        setGlobalState(initialState);
        setAgentIndex(0);
      };

      const processAgent = async (agentConfig, currentState) => {
        setNodeStates(prev => ({ ...prev, [agentConfig.id]: 'processing' }));
        addLog(`Invoking ${agentConfig.label}...`, "info");

        try {
          const response = await fetch(`http://127.0.0.1:8000/v1/agents/${agentConfig.id}/run`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ state: currentState })
          });

          if (!response.ok) {
            throw new Error(`Failed to execute ${agentConfig.id}`);
          }

          const resJson = await response.json();
          if (!resJson.ok) throw new Error(resJson.error || "Agent returned error");

          addLog(`${agentConfig.label} execution completed (${resJson.meta.elapsed_ms}ms).`, "success");
          
          const resultData = resJson.data;
          const outcome = getAgentOutcome(agentConfig.id, resultData);

          if (agentConfig.needsApproval && agentConfig.stateKey && resultData[agentConfig.stateKey]) {
            setApprovalPending({
              agentConfig,
              resultData,
              stateKey: agentConfig.stateKey
            });
            setEditedState(getApprovalEditorState(resultData, agentConfig.stateKey));
            setNodeStates(prev => ({ ...prev, [agentConfig.id]: outcome?.state || 'success' }));
          } else {
            setNodeStates(prev => ({ ...prev, [agentConfig.id]: outcome?.state || 'success' }));
            if (outcome?.message) {
              addLog(outcome.message, outcome.type);
            }
            setGlobalState(prev => ({ ...prev, ...resultData }));
            setAgentIndex(prev => prev + 1);
          }

        } catch (err) {
          addLog(`Error: ${err.message}`, "error");
          setNodeStates(prev => ({ ...prev, [agentConfig.id]: 'failure' }));
          setAgentIndex(-1);
        }
      };

      useEffect(() => {
        if (agentIndex >= 0 && agentIndex < executionAgents.length && !approvalPending) {
          const agentConfig = executionAgents[agentIndex];
          processAgent(agentConfig, globalState);
        } else if (agentIndex >= executionAgents.length && agentIndex !== -1) {
          addLog("🎉 AI Pipeline fully executed & approved.", "success");
          setAgentIndex(-1);
        }
      }, [agentIndex, approvalPending, executionAgents]);

      const handleApprove = () => {
        try {
          const parsed = JSON.parse(editedState);
          const mergedApprovedState = mergeApprovalState(
            approvalPending.resultData[approvalPending.stateKey],
            parsed
          );
          const newState = {
            ...globalState,
            ...approvalPending.resultData,
            [approvalPending.stateKey]: mergedApprovedState
          };
          setGlobalState(newState);
          addLog(`User approved ${approvalPending.agentConfig.label}'s output.`, "success");
          setApprovalPending(null);
          setAgentIndex(prev => prev + 1);
        } catch (e) {
          alert("Invalid JSON format! Please fix before approving.");
        }
      };

      const handleReject = () => {
        if (!approvalPending) return;
        setNodeStates(prev => ({ ...prev, [approvalPending.agentConfig.id]: 'failure' }));
        setGlobalState(prev => ({
          ...prev,
          errors: [...(prev.errors || []), `${approvalPending.agentConfig.id} rejected during human review`]
        }));
        addLog(`User rejected ${approvalPending.agentConfig.label}. Pipeline stopped.`, "error");
        setApprovalPending(null);
        setAgentIndex(-1);
      };

      const AgentCard = ({ agent }) => {
        const state = nodeStates[agent.id] || 'idle';
        let containerClass = "border-apple-border bg-white text-apple-muted";
        let iconBg = "text-apple-muted";
        let statusElement = null;

        if (state === 'processing') {
          containerClass = "border-apple-blue shadow-[0_0_0_1px_rgba(0,113,227,0.3)] bg-white text-apple-text";
          iconBg = "text-apple-blue";
          statusElement = <i data-lucide="loader-2" className="w-3.5 h-3.5 text-apple-blue animate-spin"></i>;
        } else if (state === 'success') {
          containerClass = "border-apple-border bg-[#F9F9F9] text-apple-text";
          iconBg = "text-apple-green";
          statusElement = <i data-lucide="check" className="w-3.5 h-3.5 text-apple-green"></i>;
        } else if (state === 'failure') {
          containerClass = "border-apple-red/50 bg-[#FEF2F2] text-apple-red";
          iconBg = "text-apple-red";
          statusElement = <i data-lucide="x" className="w-3.5 h-3.5 text-apple-red"></i>;
        } else if (state === 'warning') {
          containerClass = "border-[#E7C978] bg-[#FFF8E6] text-[#8A6A00]";
          iconBg = "text-[#B58400]";
          statusElement = <i data-lucide="alert-triangle" className="w-3.5 h-3.5 text-[#B58400]"></i>;
        }

        return (
          <div className={`p-2.5 rounded-xl border transition-all duration-300 flex items-center justify-between ${containerClass}`}>
            <div className="flex items-center gap-2.5">
              <i data-lucide={agent.icon} className={`w-4 h-4 ${iconBg}`}></i>
              <h4 className="text-[13px] font-medium tracking-tight mb-0.5">{agent.label}</h4>
            </div>
            <div className="shrink-0 flex items-center justify-center w-4 h-4">
              {statusElement}
            </div>
          </div>
        );
      };

      return (
        <React.Fragment>
          <div className="w-full lg:w-[400px] shrink-0 flex flex-col gap-6 animate-fade-in">
            <div className="bg-white rounded-2xl p-6 shadow-sm border border-apple-border">
              <h2 className="text-[17px] font-semibold text-apple-text mb-4">Campaign Brief</h2>
              <div className="space-y-4">
                <div>
                  <label className="text-[12px] font-medium text-apple-muted mb-1.5 block">Marketing Intent</label>
                  <textarea
                    className="w-full h-24 apple-input p-2.5 text-[13px] text-apple-text resize-none py-2"
                    value={formData.user_intent}
                    onChange={(e) => setFormData({ ...formData, user_intent: e.target.value })}
                    disabled={agentIndex >= 0 || approvalPending}
                    placeholder="E.g., Sell our new summer collection via email..."
                  ></textarea>
                </div>

                <div className="pt-2">
                  <label className="text-[12px] font-medium text-apple-muted mb-2 block">Channels to execute</label>
                  <div className="flex gap-4">
                    {['email', 'sms', 'voice', 'social'].map(ch => (
                      <label key={ch} className="flex items-center gap-1.5 text-[13px] text-apple-text cursor-pointer">
                        <input 
                          type="checkbox" 
                          disabled={agentIndex >= 0 || approvalPending}
                          checked={formData.channels.includes(ch)}
                          onChange={(e) => {
                            const newCh = e.target.checked 
                              ? [...formData.channels, ch] 
                              : formData.channels.filter(c => c !== ch);
                            setFormData({ ...formData, channels: newCh });
                          }}
                          className="w-3.5 h-3.5 rounded text-apple-blue focus:ring-apple-blue focus:ring-offset-0 border-gray-200"
                        />
                        <span className="capitalize">{ch.replace('_', ' ')}</span>
                      </label>
                    ))}
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-[12px] font-medium text-apple-muted mb-1.5 block">Brand</label>
                    <input
                      className="w-full apple-input p-2 text-[13px] text-apple-text"
                      type="text" value={formData.company_name} onChange={(e) => setFormData({ ...formData, company_name: e.target.value })}
                      disabled={agentIndex >= 0 || approvalPending}
                    />
                  </div>
                  <div>
                    <label className="text-[12px] font-medium text-apple-muted mb-1.5 block">Sender</label>
                    <input
                      className="w-full apple-input p-2 text-[13px] text-apple-text"
                      type="text" value={formData.sender_name} onChange={(e) => setFormData({ ...formData, sender_name: e.target.value })}
                      disabled={agentIndex >= 0 || approvalPending}
                    />
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-[12px] font-medium text-apple-muted mb-1.5 block">Target Email</label>
                    <input
                      className="w-full apple-input p-2 text-[13px] text-apple-text"
                      type="email" value={formData.recipient_email} onChange={(e) => setFormData({ ...formData, recipient_email: e.target.value })}
                      disabled={agentIndex >= 0 || approvalPending}
                    />
                  </div>
                  <div>
                    <label className="text-[12px] font-medium text-apple-muted mb-1.5 block">Target Phone</label>
                    <input
                      className="w-full apple-input p-2 text-[13px] text-apple-text"
                      type="text" value={formData.recipient_phone} onChange={(e) => setFormData({ ...formData, recipient_phone: e.target.value })}
                      disabled={agentIndex >= 0 || approvalPending}
                    />
                  </div>
                </div>

                <div className="pt-2">
                  <button
                    type="button"
                    onClick={handleRun}
                    disabled={agentIndex >= 0 || approvalPending}
                    className={`px-5 py-2.5 rounded-full font-medium text-[13px] transition-all flex items-center justify-center gap-2 w-full ${agentIndex >= 0 || approvalPending
                        ? 'bg-apple-border text-apple-muted cursor-not-allowed'
                        : 'bg-apple-blue hover:bg-apple-blueHover text-apple-text shadow-sm'
                      }`}
                  >
                     <i data-lucide="play" className="w-4 h-4"></i> Generate Campaign
                  </button>
                </div>
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-apple-border flex flex-col overflow-hidden h-[300px]">
              <div className="border-b border-apple-border px-5 py-2.5 shrink-0">
                <h3 className="text-[12px] font-medium text-apple-muted">System Logs</h3>
              </div>
              <div className="p-4 overflow-y-auto text-[12px] font-mono leading-relaxed flex flex-col gap-1.5 flex-grow">
                {logs.length === 0 && <div className="text-apple-muted/60 text-center mt-4">Awaiting execution.</div>}
                {logs.map((log, i) => (
                  <div key={i} className="flex gap-3">
                    <span className="text-apple-muted shrink-0">{log.time}</span>
                    <span className={
                      log.type === 'error' ? 'text-apple-red' :
                        log.type === 'success' ? 'text-apple-green' :
                          'text-apple-text'
                    }>{log.msg}</span>
                  </div>
                ))}
                <div ref={logsEndRef} />
              </div>
            </div>
          </div>

          <div className="flex-grow flex flex-col gap-6 animate-fade-in overflow-hidden relative">
            {approvalPending && (
              <div className="bg-white rounded-2xl p-8 shadow-[0_4px_30px_rgba(0,0,0,0.05)] border border-apple-blue animate-fade-in flex flex-col relative z-20">
                <div className="absolute top-4 right-4 flex items-center gap-2">
                   <div className="px-3 py-1 rounded-full bg-[#FEF2F2] text-apple-red text-[11px] font-bold tracking-widest uppercase flex items-center gap-1.5">
                     <span className="w-1.5 h-1.5 bg-apple-red rounded-full animate-pulse"></span>
                     Needs Review
                   </div>
                </div>
                <h2 className="text-[17px] font-semibold text-apple-text mb-2">Human-In-The-Loop: {approvalPending.agentConfig.label}</h2>
                <p className="text-[13px] text-apple-muted mb-6">Review & modify the AI-generated instructions below before granting approval to proceed to the next Agent.</p>
                
                <div className="flex flex-col lg:flex-row gap-6 mb-6">
                  <div className={`h-[400px] border border-apple-border rounded-xl bg-[#FBFBFD] shadow-inner transition-all flex flex-col pt-0 ${['copy_agent', 'image_agent'].includes(approvalPending.agentConfig.id) ? 'w-full lg:w-1/2' : 'w-full'}`}>
                    <div className="bg-white/80 border-b z-10 border-apple-border p-2.5 px-4 flex items-center justify-between text-[11px] font-semibold text-apple-muted uppercase tracking-wider backdrop-blur-md">
                        <span className="flex items-center gap-2"><i data-lucide="sliders" className="w-3.5 h-3.5"></i> Visual Properties Editor</span>
                    </div>
                    <div className="p-4 flex-grow overflow-y-auto custom-scrollbar">
                      {(() => {
                        try {
                          const parsedData = JSON.parse(editedState);
                          const handleFieldChange = (path, val) => {
                            let clone = JSON.parse(editedState);
                            let curr = clone;
                            for (let i = 0; i < path.length - 1; i++) {
                              curr = curr[path[i]];
                            }
                            curr[path[path.length - 1]] = val;
                            setEditedState(JSON.stringify(clone, null, 2));
                          };

                          const RecursiveEditor = ({ data, path }) => {
                            if (typeof data === 'string' || typeof data === 'number' || typeof data === 'boolean') {
                              return (
                                <textarea 
                                  rows={typeof data === 'string' && data.length > 60 ? 4 : 1}
                                  className="w-full text-[13px] font-mono leading-relaxed text-apple-text p-2.5 bg-white border border-gray-200 rounded-lg focus:border-apple-blue focus:ring-1 focus:ring-apple-blue/20 outline-none resize-y transition-all shadow-sm"
                                  value={data}
                                  onChange={(e) => handleFieldChange(path, typeof data === 'number' ? Number(e.target.value) : e.target.value)}
                                />
                              );
                            }
                            if (Array.isArray(data)) {
                              return <div className="pl-3 border-l-[3px] border-apple-blue/20 flex flex-col gap-4 mt-2">
                                {data.map((item, idx) => (
                                  <div key={idx} className="bg-white shadow-[0_2px_10px_rgba(0,0,0,0.02)] border text-[13px] border-gray-100 rounded-xl p-4">
                                    <div className="font-bold text-apple-blue uppercase text-[10px] tracking-wider mb-3">Item {idx + 1}</div>
                                    <RecursiveEditor data={item} path={[...path, idx]} />
                                  </div>
                                ))}
                              </div>
                            }
                            if (typeof data === 'object' && data !== null) {
                              return <div className="flex flex-col gap-3">
                                {Object.keys(data).map(key => {
                                  if (key.includes('base64')) return <div key={key} className="hidden" />;
                                  return (
                                  <div key={key} className={typeof data[key] === 'object' ? "mt-2" : "flex flex-col gap-1 mb-2"}>
                                    <div className="text-[12px] font-semibold text-gray-500 capitalize flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full bg-gray-300"></span> {key.replace(/_/g, ' ')}</div>
                                    <div className="w-full">
                                      <RecursiveEditor data={data[key]} path={[...path, key]} />
                                    </div>
                                  </div>
                                )})}
                              </div>
                            }
                            return null;
                          };

                          return <RecursiveEditor data={parsedData} path={[]} />;
                        } catch(e) {
                          return (
                            <textarea 
                              className="w-full h-full min-h-[300px] apple-input p-4 font-mono text-[13px] leading-relaxed text-apple-text resize-none focus:ring-apple-blue custom-scrollbar transition-all"
                              value={editedState}
                              onChange={(e) => setEditedState(e.target.value)}
                              spellCheck="false"
                            ></textarea>
                          );
                        }
                      })()}
                    </div>
                  </div>

                  {['copy_agent', 'image_agent'].includes(approvalPending.agentConfig.id) && (
                    <div className="hidden lg:flex w-1/2 h-[400px] border border-apple-border rounded-xl overflow-hidden bg-[#FBFBFD] flex-col shadow-inner">
                      <div className="bg-white/80 border-b border-apple-border p-2.5 px-4 flex items-center justify-between text-[11px] font-semibold text-apple-muted uppercase tracking-wider backdrop-blur-md">
                        <span className="flex items-center gap-2"><i data-lucide="eye" className="w-3.5 h-3.5"></i> Live Preview</span>
                        <span className="bg-apple-blue/10 text-apple-blue px-2.5 py-0.5 rounded-full">Email HTML</span>
                      </div>
                      <div className="flex-grow overflow-y-auto p-0 bg-[#FBFBFD] custom-scrollbar relative">
                        {(() => {
                          try {
                            const parsed = mergeApprovalState(
                              approvalPending.resultData[approvalPending.stateKey],
                              JSON.parse(editedState)
                            );
                            if (parsed && parsed.variants && parsed.variants.length > 0) {
                              const sel = parsed.variants.find(v => v.variant_id === parsed.selected_variant_id) || parsed.variants[0];
                              let htmlContent = sel.body_html || "";
                              const subject = sel.subject_line || "No Subject";
                              
                              if (htmlContent.includes('src="cid:hero_image"')) {
                                if (parsed.hero_image_base64) {
                                  htmlContent = htmlContent.replace('src="cid:hero_image"', `src="data:image/jpeg;base64,${parsed.hero_image_base64}"`);
                                } else if (parsed.hero_image_url) {
                                  htmlContent = htmlContent.replace('src="cid:hero_image"', `src="${parsed.hero_image_url}"`);
                                } else {
                                  htmlContent = htmlContent.replace('src="cid:hero_image"', `src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=600&q=80" style="opacity:0.3" alt="Pending Image Generation"`);
                                }
                              }

                              return (
                                <div className="max-w-[600px] w-full mx-auto shadow-[0_4px_20px_rgba(0,0,0,0.04)] bg-white min-h-full">
                                  <div className="bg-white p-4 border-b border-gray-100 flex flex-col gap-1 sticky top-0 z-10">
                                    <div className="text-[10px] font-semibold text-gray-400 uppercase tracking-widest">Subject</div>
                                    <div className="text-[14px] font-medium text-gray-900">{subject}</div>
                                  </div>
                                  <div 
                                    className="preview-content pointer-events-none p-4"
                                    dangerouslySetInnerHTML={{__html: htmlContent}} 
                                  />
                                </div>
                              );
                            }
                            return <div className="flex flex-col items-center justify-center h-full text-gray-400 text-[13px]"><i data-lucide="image" className="w-8 h-8 mb-3 opacity-20"></i> Preview unavailable.<br/>Waiting for variants...</div>;
                          } catch(e) {
                            return <div className="flex flex-col items-center justify-center h-full text-apple-red text-[13px]"><i data-lucide="alert-triangle" className="w-8 h-8 mb-3 opacity-50"></i> Invalid JSON format</div>;
                          }
                        })()}
                      </div>
                    </div>
                  )}
                </div>

                <div className="flex justify-end gap-3">
                  <button 
                    type="button"
                    onClick={handleReject}
                    className="px-5 py-2.5 rounded-full font-medium text-[13px] bg-[#FEF2F2] hover:bg-[#FDE7E7] text-apple-red transition-colors"
                  >
                    Reject & Stop
                  </button>
                  <button 
                    type="button"
                    onClick={() => { setEditedState(getApprovalEditorState(approvalPending.resultData, approvalPending.stateKey)); addLog("Reverted changes to original", "info"); }}
                    className="px-5 py-2.5 rounded-full font-medium text-[13px] bg-[#F9F9F9] hover:bg-[#F0F0F0] text-apple-text transition-colors"
                  >
                    Reset
                  </button>
                  <button 
                    type="button"
                    onClick={handleApprove}
                    className="px-5 py-2.5 rounded-full font-medium text-[13px] bg-apple-blue hover:bg-apple-blueHover text-apple-text shadow-sm transition-all"
                  >
                    Approve & Continue
                  </button>
                </div>
              </div>
            )}

            <div className={`bg-white rounded-2xl p-8 shadow-sm border border-apple-border flex flex-col overflow-hidden transition-all duration-500 custom-scrollbar ${approvalPending ? 'opacity-30 grayscale pointer-events-none sticky bottom-0 flex-grow-0' : 'flex-grow'}`}>
              <h2 className="text-[17px] font-semibold text-apple-text mb-6">Task Execution</h2>
              <div className="flex-grow overflow-y-auto pr-4 custom-scrollbar flex flex-col">
                {PIPELINE_PHASES.map((phase, idx) => (
                  <div key={phase.id} className="flex relative">
                    {idx !== PIPELINE_PHASES.length - 1 && (
                      <div className="absolute left-[13px] top-[30px] bottom-[-6px] w-[2px] bg-apple-border"></div>
                    )}
                    <div className="relative z-10 w-7 h-7 rounded-full bg-white border-2 border-apple-border flex items-center justify-center shrink-0 mt-1">
                      <span className="text-[11px] font-bold text-apple-muted">{idx + 1}</span>
                    </div>
                    <div className="ml-5 flex-grow pb-5 w-full">
                      <h3 className="text-[14px] font-semibold text-apple-text mb-3 mt-1.5 tracking-tight">{phase.title}</h3>
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2.5">
                        {phase.agents.map(agent => <AgentCard key={agent.id} agent={agent} />)}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </React.Fragment>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
